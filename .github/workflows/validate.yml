name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # This guard used to say the opposite: pin an exact version, never float. That was
      # right until taleseal began accepting publishes from the latest client only — an
      # older CLI composes a thinner tale, and a reader cannot tell a thin tale from an
      # honest one. A pinned plugin now seals nothing: the API refuses it with 426, and the
      # upgrade command in that refusal is one the plugin's own allowed-tools forbid. Worse,
      # plugins do not auto-update, so every pinned user would stay broken until they
      # reinstalled by hand. So the pin is the hazard now, and this guard enforces its
      # absence. Supply-chain note: `@latest` means each seal runs the newest published
      # taleseal — the trust boundary is the npm account, and it is guarded by 2FA.
      - name: No pinned npm version anywhere
        run: |
          # The pattern is split so this file never matches itself — the message below must
          # keep that property too, or the guard fails on its own source, as it used to.
          if grep -rn 'taleseal@''[0-9]' . --exclude-dir=.git; then
            echo '::error::a pinned taleseal version was found above — use the floating tag, the API accepts the latest client only'
            exit 1
          fi

      - name: All JSON parses
        run: |
          find . -name '*.json' -not -path './.git/*' -print0 | xargs -0 -n1 jq empty

      - name: Manifest source paths exist
        run: |
          jq -r '.plugins[].source' .claude-plugin/marketplace.json .agents/plugins/marketplace.json |
          while read -r src; do
            test -d "$src" || { echo "::error::missing plugin source $src"; exit 1; }
          done

      - name: Claude plugin validate
        run: |
          npm install -g @anthropic-ai/claude-code
          claude plugin validate .
